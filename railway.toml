[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
preDeployCommand = "alembic upgrade head"
# workers=1 (não 2): server/metrics.py guarda o feed/totais de tração em memória de
# processo, sem backend compartilhado (Redis/DB) entre workers. Com 2+ workers uvicorn,
# cada request de POST /v1/payments/settled cai num processo aleatório e GET /v1/traction/stats
# outro — o dashboard mostra números diferentes a cada refresh (visto em prod: 6 vs 10
# pagamentos, mesma janela). Corrigir de vez exigiria mover esse estado pro Redis/Postgres;
# por ora, 1 worker garante uma fonte única de verdade em memória. Reavaliar se o tráfego
# do serviço crescer a ponto de precisar de mais capacidade concorrente.
startCommand = "sh -c 'TELEGRAM_POLLER_ENABLED=false exec uvicorn server.app:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1 --loop uvloop --http h11'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
