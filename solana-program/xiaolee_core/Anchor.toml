[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

# Programa deployado em Devnet.
# Para deploy em mainnet, use: anchor deploy --provider.cluster mainnet
[programs.devnet]
xiaolee_core = "Fmmpn79Tij8fzYHg31ekZz4MmK9ArGzN59VogfcwhXiM"

# Mantém localnet para desenvolvimento local com `solana-test-validator`
[programs.localnet]
xiaolee_core = "Fmmpn79Tij8fzYHg31ekZz4MmK9ArGzN59VogfcwhXiM"

[registry]
url = "https://api.apr.dev"

[provider]
# Ambiente ativo: devnet (alinhado com frontend e backend)
# Para desenvolvimento local, troque para: cluster = "localnet"
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
# IDL gerado em: target/idl/xiaolee_core.json
# Types gerado em: target/types/xiaolee_core.ts
