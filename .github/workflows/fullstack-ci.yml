name: Fullstack CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/fullstack-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/fullstack-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: "ci-test-encryption-key-do-not-use"
      GEMINI_API_KEY: "ci-placeholder"
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      SOLANA_RPC_URL: "https://api.devnet.solana.com"
      SOLANA_CLUSTER: "devnet"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest -q --ignore=tests/test_anchor_integration.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_CORE_API_URL: ${{ secrets.NEXT_PUBLIC_CORE_API_URL || 'http://localhost:8000' }}
        run: npm run build
