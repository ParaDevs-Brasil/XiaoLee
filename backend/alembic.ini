# alembic.ini — Configuração do Alembic para XiaoLee
#
# URL de banco: definida via variável de ambiente DATABASE_URL em env.py.
# NÃO coloque credenciais aqui — use variáveis de ambiente.
#
# Uso:
#   Devnet/local:     alembic upgrade head   (usa SQLite)
#   Produção:         DATABASE_URL="postgresql+asyncpg://..." alembic upgrade head
#
# Criar nova migração:
#   alembic revision --autogenerate -m "descricao_da_mudanca"

[alembic]
# Diretório de scripts de migração
script_location = alembic

# Formato do nome dos arquivos de versão: timestamp_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para timestamps dos arquivos
timezone = UTC

# Codificação dos arquivos de script
output_encoding = utf-8

# URL do banco: sobrescrita em env.py via DATABASE_URL (env).
# Deixe vazio — env.py gerencia a URL dinamicamente.
sqlalchemy.url =

[post_write_hooks]
# Desabilitado: black nao esta no venv de producao.
# Para habilitar localmente: pip install black
# hooks = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
